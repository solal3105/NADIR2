name: NADIR
options:
  bundleIdPrefix: com.solalgendrin
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_LANGUAGE: fr
    DEVELOPMENT_TEAM: ZUTQ26CJ6T
targets:
  NADIR:
    type: application
    platform: iOS
    sources:
      - path: NADIR
    dependencies:
      - target: NadirWidgets
        embed: true
    entitlements:
      path: NADIR/NADIR.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.solalgendrin.nadir2
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solalgendrin.nadir2
        INFOPLIST_KEY_CFBundleDisplayName: NADIR
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
    info:
      path: NADIR/Info.plist
      properties:
        CFBundleDisplayName: NADIR
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: >-
          NADIR utilise votre position pour récupérer la météo locale et vous
          dire quand ouvrir ou fermer vos fenêtres.
        ITSAppUsesNonExemptEncryption: false
  NadirWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: NadirWidgets
      - path: NADIR/Models
      - path: NADIR/Engine
      - path: NADIR/Shared
      - path: NADIR/Services/WeatherService.swift
      - path: NADIR/Views/Theme.swift
    entitlements:
      path: NadirWidgets/NadirWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.solalgendrin.nadir2
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solalgendrin.nadir2.widgets
        INFOPLIST_KEY_CFBundleDisplayName: NADIR
        SKIP_INSTALL: true
    info:
      path: NadirWidgets/Info.plist
      properties:
        CFBundleDisplayName: NADIR
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
