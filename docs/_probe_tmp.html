<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"></head><body style="margin:0">
<iframe id="f" src="labo.html" style="border:0;width:360px;height:700px"></iframe>
<pre id="out" style="position:fixed;top:0;left:0;background:#fff;color:#000;z-index:9;font-size:10px;margin:0"></pre>
<script>
setTimeout(function(){
  var d = document.getElementById('f').contentDocument;
  var w = document.getElementById('f').contentWindow;
  var el = d.querySelector('.hud-clock');
  var r = el.getBoundingClientRect();
  var cs = w.getComputedStyle(el);
  var stage = d.getElementById('stage').getBoundingClientRect();
  document.getElementById('out').textContent = JSON.stringify({
    rect:{x:r.x,y:r.y,w:r.width,h:r.height},
    stage:{x:stage.x,y:stage.y,w:stage.width,h:stage.height},
    disp:cs.display, vis:cs.visibility, op:cs.opacity, pos:cs.position,
    top:cs.top, right:cs.right, color:cs.color, z:cs.zIndex,
    place:d.getElementById('hudPlace').textContent,
    iw:w.innerWidth
  }, null, 1);
}, 4000);
</script></body></html>
